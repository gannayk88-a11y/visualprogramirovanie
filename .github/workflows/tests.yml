name: Run Tests
on:
  push:
    branches:
      - laba2 # Проверьте, что имя ветки в Git именно такое
      - laba3
      - laba4
      - laba5
      - laba6

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm test
